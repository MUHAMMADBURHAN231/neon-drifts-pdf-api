services:
  - type: web
    name: neon-drifts-pdf-api
    env: docker
    region: frankfurt  # closest to Lahore
    plan: free
    envVars:
      - key: PDF_API_SECRET
        sync: false   # set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        sync: false   # set manually in Render dashboard
    healthCheckPath: /health
